name: "CD: PyPI package (cibuildwheel)"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize, reopened, ready_for_review]

env:
  DSF_COMPATIBILITY_BUILD: "ON"

jobs:
  check-version:
    name: Check version and decide publish
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      publish_version: ${{ steps.plan.outputs.publish_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract version from dsf.hpp
        id: extract
        run: |
          VERSION_MAJOR=$(grep -oP 'DSF_VERSION_MAJOR = \K\d+' src/dsf/dsf.hpp)
          VERSION_MINOR=$(grep -oP 'DSF_VERSION_MINOR = \K\d+' src/dsf/dsf.hpp)
          VERSION_PATCH=$(grep -oP 'DSF_VERSION_PATCH = \K\d+' src/dsf/dsf.hpp)
          VERSION="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Extracted version: ${VERSION}"

      - name: Plan publish version
        id: plan
        run: |
          PUBLISH_VERSION="${{ steps.extract.outputs.version }}"
          echo "publish_version=${PUBLISH_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Planned publish version: ${PUBLISH_VERSION}"

      - name: Check publish policy for PyPI
        id: check
        run: |
          VERSION="${{ steps.plan.outputs.publish_version }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "PR build: always build and publish to TestPyPI"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PYPI_URL="https://pypi.org/pypi/dsf-mobility/${VERSION}/json"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${PYPI_URL}")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Version ${VERSION} already exists on PyPI"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build-linux:
    name: Build Linux wheels (manylinux) with cibuildwheel
    needs: [check-version]
    runs-on: ubuntu-latest
    if: needs.check-version.outputs.should_build == 'true' && (github.event_name == 'push' || github.event.pull_request.draft == false)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install cibuildwheel wheel build

      - name: Build wheels via cibuildwheel (manylinux)
        env:
          # Attempt to satisfy CMake find_package(TBB) by installing the PyPI 'tbb' wheel
          CIBW_BEFORE_BUILD: "python -m pip install --upgrade pip && python -m pip install tbb"
          CIBW_OUTPUT_DIR: wheelhouse
          CIBW_PLATFORM: manylinux
          # Pass CMake args to the build environment
          CIBW_ENVIRONMENT: "CMAKE_ARGS='-DDSF_COMPATIBILITY_BUILD=ON' DSF_PACKAGE_VERSION=${{ needs.check-version.outputs.publish_version }}"
        run: |
          python -m cibuildwheel --output-dir wheelhouse

      - name: Upload Linux wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheel-linux
          path: wheelhouse/*.whl

  build-macos:
    name: Build macOS wheels with cibuildwheel
    needs: [check-version]
    runs-on: macos-latest
    if: needs.check-version.outputs.should_build == 'true' && (github.event_name == 'push' || github.event.pull_request.draft == false)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install cibuildwheel wheel build

      - name: Build wheels via cibuildwheel (macos)
        env:
          CIBW_BEFORE_BUILD: "python -m pip install --upgrade pip && python -m pip install tbb"
          CIBW_OUTPUT_DIR: wheelhouse
          CIBW_PLATFORM: macos
          CIBW_ENVIRONMENT: "CMAKE_ARGS='-DDSF_COMPATIBILITY_BUILD=ON' DSF_PACKAGE_VERSION=${{ needs.check-version.outputs.publish_version }}"
        run: |
          python -m cibuildwheel --output-dir wheelhouse

      - name: Upload macOS wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheel-macos
          path: wheelhouse/*.whl

  build-windows:
    name: Build Windows wheels with cibuildwheel
    needs: [check-version]
    runs-on: windows-latest
    if: needs.check-version.outputs.should_build == 'true' && (github.event_name == 'push' || github.event_pull_request.draft == false)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install cibuildwheel wheel build

      - name: Build wheels via cibuildwheel (windows)
        env:
          CIBW_BEFORE_BUILD: "python -m pip install --upgrade pip && python -m pip install tbb"
          CIBW_OUTPUT_DIR: wheelhouse
          CIBW_PLATFORM: windows
          CIBW_ENVIRONMENT: "CMAKE_ARGS='-DDSF_COMPATIBILITY_BUILD=ON' DSF_PACKAGE_VERSION=${{ needs.check-version.outputs.publish_version }}"
        run: |
          python -m cibuildwheel --output-dir wheelhouse

      - name: Upload Windows wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheel-windows
          path: wheelhouse/*.whl

  publish:
    name: Publish to TestPyPI / PyPI
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: needs.check-version.outputs.should_build == 'true' && (github.event_name == 'push' || github.event.pull_request.draft == false)
    steps:
      - name: Download built wheels
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Collect all wheels
        run: |
          mkdir -p dist
          find dist-artifacts -name '*.whl' -exec cp {} dist/ \;
          echo "Dist contents:" && ls -la dist/

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install twine
        run: python -m pip install --upgrade pip && python -m pip install twine

      - name: Publish to TestPyPI (PRs)
        if: github.event_name == 'pull_request'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI }}
        run: python -m twine upload --repository testpypi dist/* --verbose

      - name: Publish to PyPI (push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI }}
        run: python -m twine upload dist/* --verbose
