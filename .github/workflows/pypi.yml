name: "CD: PyPI package"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  extract-version:
    name: Extract version from dsf.hpp
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    outputs:
      version: ${{ steps.extract.outputs.version }}
      publish-version: ${{ steps.plan.outputs.publish_version }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Extract version from dsf.hpp
      id: extract
      run: |
        VERSION_MAJOR=$(grep -oP 'DSF_VERSION_MAJOR = \K\d+' src/dsf/dsf.hpp)
        VERSION_MINOR=$(grep -oP 'DSF_VERSION_MINOR = \K\d+' src/dsf/dsf.hpp)
        VERSION_PATCH=$(grep -oP 'DSF_VERSION_PATCH = \K\d+' src/dsf/dsf.hpp)
        VERSION="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}"
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "Extracted version: ${VERSION}"

    - name: Plan publish version
      id: plan
      run: |
        PUBLISH_VERSION="${{ steps.extract.outputs.version }}"
        
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          PUBLISH_VERSION="${PUBLISH_VERSION}.dev${{ github.run_number }}"
        fi
        
        echo "publish_version=${PUBLISH_VERSION}" >> $GITHUB_OUTPUT
        echo "Planned publish version: ${PUBLISH_VERSION}"

  build-wheels:
    name: Build wheels on ${{ matrix.os }} (Python ${{ matrix.python-version }})
    needs: extract-version
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.14"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Build and publish wheels
      uses: pypa/cibuildwheel@v3.4.1
      env:
        DSF_PACKAGE_VERSION: ${{ needs.extract-version.outputs.publish-version }}

    - name: Upload wheel artifacts
      uses: actions/upload-artifact@v6
      with:
        name: wheel-${{ matrix.os }}-${{ matrix.python-version }}
        path: wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    needs: extract-version
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.draft == false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip build

    - name: Build source distribution
      env:
        DSF_PACKAGE_VERSION: ${{ needs.extract-version.outputs.publish-version }}
      run: python -m build --sdist

    - name: Upload sdist artifact
      uses: actions/upload-artifact@v6
      with:
        name: sdist
        path: dist/*.tar.gz

  publish:
    name: Publish to PyPI / TestPyPI
    needs: [extract-version, build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.draft == false

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist-artifacts

    - name: Prepare distributions directory
      run: |
        mkdir -p dist
        find dist-artifacts -name '*.whl' -exec cp {} dist/ \;
        find dist-artifacts -name '*.tar.gz' -exec cp {} dist/ \;
        echo "Contents of dist/:"
        ls -lh dist/

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"

    - name: Install twine
      run: python -m pip install twine

    - name: Publish to TestPyPI (on PR)
      if: github.event_name == 'pull_request'
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.TEST_PYPI }}
      run: |
        python -m twine upload --repository testpypi dist/* --verbose

    - name: Publish to PyPI (on push to main)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI }}
      run: |
        python -m twine upload dist/* --verbose
