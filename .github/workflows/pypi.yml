name: "CD: PyPI package"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:

  # ---------------------------------------------------------------------------
  # 1. Version gating – determines whether the rest of the pipeline should run
  # ---------------------------------------------------------------------------
  check-version:
    name: Check if version exists on PyPI
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    outputs:
      should_build:    ${{ steps.check.outputs.should_build }}
      version:         ${{ steps.extract.outputs.version }}
      publish_version: ${{ steps.plan.outputs.publish_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract version from dsf.hpp
        id: extract
        run: |
          VERSION_MAJOR=$(grep -oP 'DSF_VERSION_MAJOR = \K\d+' src/dsf/dsf.hpp)
          VERSION_MINOR=$(grep -oP 'DSF_VERSION_MINOR = \K\d+' src/dsf/dsf.hpp)
          VERSION_PATCH=$(grep -oP 'DSF_VERSION_PATCH = \K\d+' src/dsf/dsf.hpp)
          VERSION="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Extracted version: ${VERSION}"

      - name: Plan publish version
        id: plan
        run: |
          BASE_VERSION="${{ steps.extract.outputs.version }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Unique PEP 440 dev version for TestPyPI
            PUBLISH_VERSION="${BASE_VERSION}.dev${GITHUB_RUN_ID}${GITHUB_RUN_ATTEMPT}"
          else
            PUBLISH_VERSION="${BASE_VERSION}"
          fi
          echo "publish_version=${PUBLISH_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Planned publish version: ${PUBLISH_VERSION}"

      - name: Check publish policy for PyPI
        id: check
        run: |
          VERSION="${{ steps.plan.outputs.publish_version }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "PR build – unique TestPyPI version ${VERSION}; skipping existence check."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PYPI_URL="https://pypi.org/pypi/dsf-mobility/${VERSION}/json"
          echo "Checking whether dsf-mobility ${VERSION} already exists on PyPI..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${PYPI_URL}")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Version ${VERSION} already published – skipping build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version ${VERSION} not found (HTTP ${HTTP_STATUS}) – will build."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # 2. Smoke-test that a uv source build + wheel import still works
  # ---------------------------------------------------------------------------
  uv-validate:
    name: Validate uv source build
    needs: [check-version]
    runs-on: ubuntu-latest
    if: >
      needs.check-version.outputs.should_build == 'true' &&
      (github.event_name == 'push' || github.event.pull_request.draft == false)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential doxygen libtbb-dev

      - name: Build (wheel + sdist)
        env:
          CMAKE_ARGS: "-DDSF_OPTIMIZE_ARCH=OFF"
          DSF_PACKAGE_VERSION: ${{ needs.check-version.outputs.publish_version }}
        run: uv build

      - name: Smoke-test wheel import
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install dist/*.whl
          python -c "import dsf; print(dsf.__version__)"

  # ---------------------------------------------------------------------------
  # 3a. Linux wheels – x86_64 + aarch64 (via QEMU), manylinux_2_28
  # ---------------------------------------------------------------------------
  build-wheels-linux:
    name: Build wheels (Linux)
    needs: [check-version, uv-validate]
    runs-on: ubuntu-latest
    if: >
      needs.check-version.outputs.should_build == 'true' &&
      (github.event_name == 'push' || github.event.pull_request.draft == false)
    # DSF_PACKAGE_VERSION is forwarded into the build containers via
    # environment-pass in pyproject.toml
    env:
      DSF_PACKAGE_VERSION: ${{ needs.check-version.outputs.publish_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU (for aarch64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: aarch64

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1

      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheel-linux
          path: wheelhouse/*.whl

  # ---------------------------------------------------------------------------
  # 3b. macOS wheels – x86_64 + arm64, built from a single Apple Silicon runner
  # ---------------------------------------------------------------------------
  build-wheels-macos:
    name: Build wheels (macOS)
    needs: [check-version, uv-validate]
    runs-on: macos-26
    if: >
      needs.check-version.outputs.should_build == 'true' &&
      (github.event_name == 'push' || github.event.pull_request.draft == false)
    env:
      DSF_PACKAGE_VERSION: ${{ needs.check-version.outputs.publish_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1

      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheel-macos
          path: wheelhouse/*.whl

  # ---------------------------------------------------------------------------
  # 3c. Windows wheels – AMD64 only; TBB bundled by delvewheel
  # ---------------------------------------------------------------------------
  build-wheels-windows:
    name: Build wheels (Windows)
    needs: [check-version, uv-validate]
    runs-on: windows-latest
    if: >
      needs.check-version.outputs.should_build == 'true' &&
      (github.event_name == 'push' || github.event.pull_request.draft == false)
    env:
      DSF_PACKAGE_VERSION: ${{ needs.check-version.outputs.publish_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1

      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheel-windows
          path: wheelhouse/*.whl

  # ---------------------------------------------------------------------------
  # 4. Source distribution – users who install from sdist still need the
  #    system deps (cmake, doxygen, libtbb-dev), but binary-wheel users need none
  # ---------------------------------------------------------------------------
  build-sdist:
    name: Build source distribution
    needs: [check-version, uv-validate]
    runs-on: ubuntu-latest
    if: >
      needs.check-version.outputs.should_build == 'true' &&
      (github.event_name == 'push' || github.event.pull_request.draft == false)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential doxygen libtbb-dev

      - name: Install build frontend
        run: pip install build

      - name: Build sdist
        env:
          DSF_PACKAGE_VERSION: ${{ needs.check-version.outputs.publish_version }}
        run: python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/*.tar.gz

  # ---------------------------------------------------------------------------
  # 5. Publish – TestPyPI on PRs, PyPI on main
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs:
      - check-version
      - uv-validate
      - build-wheels-linux
      - build-wheels-macos
      - build-wheels-windows
      - build-sdist
    runs-on: ubuntu-latest
    if: >
      needs.check-version.outputs.should_build == 'true' &&
      (github.event_name == 'push' || github.event.pull_request.draft == false)

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Collect all distributions
        run: |
          mkdir -p dist
          find dist-artifacts -name '*.whl'   -exec cp {} dist/ \;
          find dist-artifacts -name '*.tar.gz' -exec cp {} dist/ \;
          echo "Contents of dist/:"
          ls -la dist/

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install twine
        run: pip install twine

      - name: Publish to TestPyPI (PR)
        if: github.event_name == 'pull_request'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI }}
        run: python -m twine upload --repository testpypi dist/* --verbose

      - name: Publish to PyPI (push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI }}
        run: python -m twine upload dist/* --verbose